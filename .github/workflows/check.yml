name: check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: unit tests
        run: bun run test

      - name: ren-registry check
        env:
          RENREGISTRY_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: bun cli/src/index.ts check
