name: publish

on:
  push:
    branches: [main]

concurrency:
  group: registry-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: configure git
        run: |
          git config user.name "ren-registry-bot"
          git config user.email "registry@renai.build"

      - name: ren-registry publish
        env:
          REN_PUBLISHER_PAT: ${{ secrets.REN_PUBLISHER_PAT }}
          REN_REGISTRY_URL: ${{ secrets.REN_REGISTRY_URL }}
          REN_REGISTRY_REPO_URL: https://github.com/${{ github.repository }}
        run: bun cli/src/index.ts publish

      - name: push commits
        run: git push origin HEAD:${{ github.ref_name }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Registry publish failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Registry Publish Failed* :x:\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }}>\n*Branch:* `${{ github.ref_name }}`\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }
