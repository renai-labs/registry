<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ren — Your Setup</title>
    <script>
      document.documentElement.classList.add("dark")
    </script>
    <style>
      :root {
  /* ─── BRAND ─── (neutral by design — flips with theme via the tokens it points at)
     Brand surfaces resolve to foreground so CTAs and focus rings read as
     black-on-light / white-on-dark. Chromatic pop lives on --function-info
     (links, spinners). Retheme by repointing these three vars. */
  --brand: var(--foreground);
  --brand-light: var(--text-secondary); /* lifts on light, dims on dark — natural hover in both */
  --brand-focus: var(--foreground);

  /* ─── TYPOGRAPHY ─── */
  --font-family-base:
    var(--font-sans, "Inter Variable"), "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
    Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
  --font-family-mono:
    var(--font-mono-override, "Berkeley Mono"), ui-monospace, "SF Mono", SFMono-Regular, Menlo, Monaco, Consolas,
    "Liberation Mono", "Courier New", monospace;

  /* Linear typeface identity — applied globally on body in index.css */
  --font-feature-settings-base: "cv01", "ss03";

  /* ─── RADIUS ─── */
  --radius: 0.5rem;

  /* ─── CORE PALETTE (light) ───
     Linear's light mode uses LCH at hue 282 (slightly more violet than dark's 272.695)
     with very low chroma (0.5–1.25) — neutral surfaces with a faint cool tint. */
  --background: lch(95.94% 0.5 282); /* page bg */
  --foreground: lch(9.894% 0 282); /* near-black primary text */
  --card: lch(98.94% 0.5 282); /* main content surface */
  --card-foreground: lch(9.894% 0 282);
  --popover: lch(100% 0 282); /* pure white — settings cards, dropdowns */
  --popover-foreground: lch(9.894% 0 282);
  --primary: lch(9.894% 0 282);
  --primary-foreground: #ffffff;
  --secondary: lch(93.44% 0.5 282);
  --secondary-foreground: lch(9.894% 0 282);
  --muted: lch(91.94% 0.5 282);
  --muted-foreground: lch(39.576% 1.25 282);
  /* Accent = subtle hover/selected wash for menus, list rows, dropdowns.
     Decoupled from brand — chromatic pop lives on --function-info only. */
  --accent: var(--tint-4);
  --accent-foreground: var(--foreground);
  --destructive: #e5484d;
  --destructive-foreground: #ffffff;
  /* Structural border — light mode inverts the relationship: primary is whisper,
     tertiary (= --border-strong) is the strongest divider. The DEFAULT --border
     maps to Linear's --color-border-secondary. */
  --border: lch(89.49% 0 282);
  /* Component-level border (buttons, tabs, segmented) — translucent black */
  --border-component: rgba(0, 0, 0, 0.06);
  --input: lch(86.5% 0 282);
  --ring: var(--brand-focus);

  /* ─── SCOPE ─── (where a resource is defined: org/pod/project/user) */
  --scope-org: #7c4dff;
  --scope-org-bg: rgba(124, 77, 255, 0.08);
  --scope-pod: #3b82f6;
  --scope-pod-bg: rgba(59, 130, 246, 0.08);
  --scope-project: #22c55e;
  --scope-project-bg: rgba(34, 197, 94, 0.08);
  --scope-user: #8a8f98;
  --scope-user-bg: rgba(138, 143, 152, 0.08);

  /* ─── EXTERNAL BRAND ─── (third-party logos; identical in light + dark) */
  --brand-claude: #d97757;
  --brand-slack-pink: #e01e5a;
  --brand-slack-blue: #36c5f0;
  --brand-slack-green: #2eb67d;
  --brand-slack-yellow: #ecb22e;

  /* ─── CHART ─── */
  --chart-1: #27a644;
  --chart-2: #3b82f6;
  --chart-3: #00b8cc;
  --chart-4: #f0bf00;
  --chart-5: #fc7840;

  /* ─── SIDEBAR ─── (Linear: page bg shows through; divider is the strongest border) */
  --sidebar: lch(95.94% 0.5 282);
  --sidebar-foreground: lch(19.788% 1.25 282); /* secondary by default; nav inactive uses tertiary */
  --sidebar-primary: lch(9.894% 0 282);
  --sidebar-primary-foreground: #ffffff;
  --sidebar-accent: rgba(0, 0, 0, 0.04);
  --sidebar-accent-foreground: lch(9.894% 0 282);
  --sidebar-border: rgba(0, 0, 0, 0.06);
  --sidebar-ring: var(--brand-focus);

  /* ─── SURFACE TINTS (light) ─── */
  --tint-1: rgba(0, 0, 0, 0.02);
  --tint-2: rgba(0, 0, 0, 0.03);
  --tint-3: rgba(0, 0, 0, 0.04);
  --tint-4: rgba(0, 0, 0, 0.05);
  --tint-5: rgba(0, 0, 0, 0.08);
  --tint-6: rgba(0, 0, 0, 0.1);

  /* ─── BORDERS ─── (light: tertiary = strongest, mirroring Linear's invariant
     "stronger divider is always tertiary regardless of theme") */
  --border-main: lch(96.24% 0 282); /* whisper / primary */
  --border-light: lch(89.49% 0 282); /* standard / secondary */
  --border-dark: lch(85.44% 0 282); /* strongest / tertiary */
  --border-input-active: lch(50% 1.25 282 / 0.6);

  /* ─── TEXT HIERARCHY ─── (Linear light: hue 282, chroma 0–1.25) */
  --text-primary: lch(9.894% 0 282);
  --text-secondary: lch(19.788% 1.25 282);
  --text-tertiary: lch(39.576% 1.25 282);
  --text-quaternary: lch(65.3% 1.25 282);
  --text-disabled: lch(82.484% 0.054 281.837);
  --text-on-brand: #ffffff;

  /* ─── FILL TINTS ─── (messaging/panel hover + subtle surfaces) */
  --fill-tsp-white-light: rgba(0, 0, 0, 0.03);
  --fill-tsp-white-main: rgba(0, 0, 0, 0.05);
  --fill-tsp-white-dark: rgba(0, 0, 0, 0.07);
  --fill-white: lch(100% 0 282);
  --background-gray-main: var(--background);
  --table-header-bg: lch(93.44% 0.5 282);

  /* ─── ICONS ─── */
  --icon-primary: lch(19.188% 1.25 282);
  --icon-secondary: lch(39.576% 1.25 282);
  --icon-container: lch(93.44% 0.5 282);
  --icon-container-border: rgba(0, 0, 0, 0.06);

  /* ─── ELEVATED SURFACE ─── (pure white in light / card bg in dark) */
  --surface-elevated: lch(100% 0 282);

  /* ─── OVERLAY ─── (modal/dialog scrim — same in both themes) */
  --overlay: rgba(0, 0, 0, 0.5);

  /* ─── SELECTION ─── (Linear light: tertiary text @ 0.2 alpha) */
  --selection-bg: lch(39.576% 1.25 282 / 0.2);

  /* ─── HEADER & COMPONENT TABS ─── (Linear's --header-color, --button-tab-*) */
  --header-color: lch(98.94% 0.5 282);
  --button-tab-bg: lch(100% 0 282);
  --button-tab-color: lch(20% 1 282);
  --button-tab-border: lch(86.5% 0 282);
  --button-tab-shadow: 0 1px 1px 0 lch(0% 0 0 / 0.04), 0 1px 2px 0 lch(0% 0 0 / 0.06);
  --scrollbar-color: lch(65.6% 1.25 282);

  /* ─── LAYOUT ─── (Linear's measured chrome dimensions) */
  --sidebar-width: 244px;
  --header-height: 43px;

  /* ─── SEMANTIC STATUS ─── */
  --function-success: #27a644;
  --function-success-bg: rgba(39, 166, 68, 0.06);
  --function-success-border: rgba(39, 166, 68, 0.18);
  --function-info: #5e6ad2; /* chromatic — links, spinners, in-progress dots */
  --function-pending: #8a8f98;
  --function-error: #e5484d;
  --function-error-bg: rgba(229, 72, 77, 0.06);
  --function-error-border: rgba(229, 72, 77, 0.18);
  --function-warning: #f0bf00;

  /* ─── BRAND (third-party, fixed by their guidelines) ─── */
  --brand-google-blue: #4285f4;
  --brand-google-green: #34a853;
  --brand-google-yellow: #fbbc05;
  --brand-google-red: #ea4335;

  /* ─── STATUS ICONS ─── (lifecycle indicators on rows; theme-identical) */
  --status-running: lch(68% 64.37 141.95);
  --status-waiting: lch(80% 90 85);
  --status-done: lch(48% 59.31 288.43);
  --status-error: var(--function-error);
  --status-pending: lch(75% 0 0);

  /* ─── FILE-TYPE ICONS ─── (theme-identical; bg uses color-mix at 8%) */
  --file-icon-image: #a855f7;
  --file-icon-sheet: #22c55e;
  --file-icon-code: #6b7280;
  --file-icon-link: #3b82f6;
  --file-icon-doc: #3b82f6;
  --file-icon-pdf: #ef4444;
  --file-icon-presentation: #f59e0b;
  --file-icon-default: #6b7280;

  /* ─── EDITOR ─── (markdown / rich-text body) */
  --editor-font-size: 0.9375rem; /* 15px */
  --editor-line-height: 1.6;
  --editor-letter-spacing: -0.00666667em;
  --editor-block-spacing: 1rem;

  /* ─── PANEL DARK ─── (always dark; for terminal/code viewers) */
  --panel-dark-bg: lch(12.236% 2.213 272.695);
  --panel-dark-text: #ffffff;
  --panel-dark-surface: lch(14.736% 2.713 272.695);
  --panel-dark-sidebar: lch(17.236% 4.213 272.695);
  --panel-dark-canvas: lch(19.736% 5.213 272.695);
  --panel-dark-border: rgba(255, 255, 255, 0.08);
  --panel-dark-hover: rgba(255, 255, 255, 0.08);
  --panel-dark-active: rgba(255, 255, 255, 0.12);

  /* ─── CANVAS / BLUEPRINT ─── (@ren/canvas reads Ren's semantic tokens directly so the
     agent-stack diagram tracks light + dark. Only these graph-specific wire roles get a token
     — each aliases a theme token so it still flips. Everything else (surfaces, borders, text,
     frames, selection) maps straight onto existing tokens in packages/canvas/src/styles.css.) */
  --canvas-wire: var(--text-quaternary); /* idle route / state wires */
  --canvas-wire-hot: var(--foreground); /* the lit / active path */
  --canvas-wend: var(--text-tertiary); /* wire endpoint dots */

  /* ─── SHADOWS ─── */
  /* Inset 1px borders — Linear's preferred technique. Use instead of `border: 1px`
     when an element gains/loses a border on hover/focus (avoids layout shift) or
     when borders should flush-align with a grid (no extra 1px of layout space). */
  --shadow-ring: inset 0 0 0 1px var(--border);
  --shadow-ring-strong: inset 0 0 0 1px var(--border-dark);
  --shadow-ring-brand: inset 0 0 0 1px var(--brand);

  --shadow-low: 0px 2px 4px rgba(0, 0, 0, 0.1);
  --shadow-button:
    rgba(0, 0, 0, 0) 0px 8px 2px 0px, rgba(0, 0, 0, 0.01) 0px 5px 2px 0px, rgba(0, 0, 0, 0.04) 0px 3px 2px 0px,
    rgba(0, 0, 0, 0.07) 0px 1px 1px 0px, rgba(0, 0, 0, 0.08) 0px 0px 1px 0px;

  /* ─── MOTION: DURATION ─── */
  --duration-instant: 100ms;
  --duration-fast: 150ms;
  --duration-base: 200ms;
  --duration-slow: 300ms;
  --duration-slower: 500ms;

  /* ─── MOTION: EASING ─── */
  --ease-base: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-in: cubic-bezier(0.4, 0, 1, 1);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-bounce: cubic-bezier(0.34, 1.96, 0.64, 1);

  /* ─── MOTION: SCALE / STAGGER ─── */
  --scale-press: 0.97;
  --scale-pop: 1.05;
  --stagger-fast: 30ms;
  --stagger-base: 50ms;

  /* ─── DISTANCE ─── (intra-component gaps) */
  --distance-sm: 4px;
  --distance-md: 8px;
  --distance-lg: 16px;
  --distance-xl: 24px;

  /* ─── Z-INDEX LAYERS ─── */
  --layer-footer: 50;
  --layer-scrollbar: 75;
  --layer-header: 100;
  --layer-overlay: 500;
  --layer-popover: 600;
  --layer-dialog: 700;
  --layer-toast: 800;
  --layer-tooltip: 1100;
}
.dark,
:root[data-theme="dark"] {
  /* Surfaces — Linear uses LCH at hue 272.695 for a faint cool-violet undertone.
     Sidebar/app bg is darker than the main content surface (inverse of typical patterns).
     Primary text is NOT pure white — Linear uses lch(95% 1 272) to keep text from
     punching too hard against dark surfaces; pure white is reserved for primary fills. */
  --background: lch(11% 2 272.695); /* sidebar/app bg */
  --foreground: lch(95% 1 272.695);
  --card: lch(13.5% 2.5 272.695); /* main content surface (lighter than bg) */
  --card-foreground: lch(95% 1 272.695);
  --popover: lch(17.236% 4.213 272.695);
  --popover-foreground: lch(95% 1 272.695);
  --primary: lch(95% 1 272.695);
  --primary-foreground: #08090a;
  --secondary: lch(17.236% 4.213 272.695);
  --secondary-foreground: lch(91.224% 2.106 272.695);
  --muted: lch(19.736% 5.213 272.695);
  --muted-foreground: lch(64.894% 2.106 272.695);
  --destructive: #e5484d;
  --destructive-foreground: #ffffff;
  /* Structural border — solid LCH-tinted dark gray (Linear actual) */
  --border: lch(17.036% 3.413 272.695);
  /* Component-level border — translucent white at 5.5% (Linear's --button-tab-border) */
  --border-component: rgba(255, 255, 255, 0.055);
  --input: lch(22.593% 2.927 272.695);
  --ring: var(--brand-focus);

  --sidebar: lch(11% 2 272.695);
  --sidebar-foreground: lch(91.224% 2.106 272.695); /* secondary by default; nav inactive uses tertiary */
  --sidebar-primary: lch(95% 1 272.695);
  --sidebar-primary-foreground: #08090a;
  --sidebar-accent: rgba(255, 255, 255, 0.06);
  --sidebar-accent-foreground: lch(95% 1 272.695);
  --sidebar-border: rgba(255, 255, 255, 0.06);
  --sidebar-ring: var(--brand-focus);

  --tint-1: rgba(255, 255, 255, 0.02);
  --tint-2: rgba(255, 255, 255, 0.03);
  --tint-3: rgba(255, 255, 255, 0.04);
  --tint-4: rgba(255, 255, 255, 0.05);
  --tint-5: rgba(255, 255, 255, 0.08);
  --tint-6: rgba(255, 255, 255, 0.1);

  --border-main: rgba(255, 255, 255, 0.08);
  --border-light: rgba(255, 255, 255, 0.1);
  --border-dark: rgba(255, 255, 255, 0.14);
  --border-input-active: rgba(255, 255, 255, 0.3);

  /* Text — Linear's primary is an off-white, NOT pure white. Pure white is too
     intense against the dark surfaces and reads as "bolder" even at the same weight. */
  --text-primary: lch(95% 1 272.695);
  --text-secondary: lch(91.224% 2.106 272.695);
  --text-tertiary: lch(64.894% 2.106 272.695);
  --text-quaternary: lch(42.076% 2.106 272.695);
  --text-disabled: lch(42.076% 2.106 272.695);

  --fill-tsp-white-light: rgba(255, 255, 255, 0.04);
  --fill-tsp-white-main: rgba(255, 255, 255, 0.06);
  --fill-tsp-white-dark: rgba(255, 255, 255, 0.08);
  --fill-white: lch(13.5% 2.5 272.695);
  --background-gray-main: var(--background);
  --table-header-bg: lch(13.5% 2.5 272.695);

  --icon-primary: lch(95% 1 272.695);
  --icon-secondary: lch(64.894% 2.106 272.695);
  --icon-container: lch(17.236% 4.213 272.695);
  --icon-container-border: rgba(255, 255, 255, 0.08);

  --surface-elevated: lch(13.5% 2.5 272.695);

  --selection-bg: lch(64.894% 2.106 272.695 / 0.2);

  /* Header & component tabs — Linear's actual dark values */
  --header-color: lch(13.5% 2.5 272.695);
  --button-tab-bg: lch(15.5% 2.7 272.695);
  --button-tab-color: lch(64.894% 2.106 272.695);
  --button-tab-border: lch(100% 0 0 / 0.055);
  --button-tab-shadow: 0 4px 4px -1px lch(0% 0 0 / 0.04), 0 1px 1px 0 lch(0% 0 0 / 0.08);
  --scrollbar-color: lch(42.376% 2.106 272.695);

  --function-success-bg: rgba(39, 166, 68, 0.1);
  --function-success-border: rgba(39, 166, 68, 0.25);
  --function-pending: #636366;
  --function-error-bg: rgba(229, 72, 77, 0.1);
  --function-error-border: rgba(229, 72, 77, 0.25);

  --scope-org: #a78bfa;
  --scope-org-bg: rgba(167, 139, 250, 0.12);
  --scope-pod: #60a5fa;
  --scope-pod-bg: rgba(96, 165, 250, 0.12);
  --scope-project: #4ade80;
  --scope-project-bg: rgba(74, 222, 128, 0.12);
  --scope-user: #a1a1aa;
  --scope-user-bg: rgba(161, 161, 170, 0.12);
}

    <style>
      
/* Blueprint chrome — structure only. Colours map onto Ren's semantic tokens (@ren/ui theme.css)
   so the diagram tracks light + dark; this file hardcodes no palette, only the graph-specific
   wire tokens (--canvas-*) and behavioural opacities. */
[data-ren-canvas] {
  background: var(--background);
  font-family: var(--font-family-base);
}

[data-ren-empty] {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  color: var(--text-tertiary);
  font-size: 11px;
}

[data-ren-canvas] .react-flow,
[data-ren-canvas] .react-flow__pane {
  background: transparent;
}

/* Handles anchor the wires but never paint — the wire draws its own endpoint dots. */
[data-ren-canvas] .react-flow__handle {
  width: 6px;
  height: 6px;
  min-width: 0;
  min-height: 0;
  border: 0;
  background: transparent;
  opacity: 0;
}

/* ---------------- cards ---------------- */
[data-ren-card] {
  position: relative;
  cursor: pointer;
  user-select: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: calc(var(--radius) / 2);
  overflow: hidden;
  transition:
    opacity 0.2s,
    border-color 0.2s,
    box-shadow 0.2s;
}
[data-ren-card]:hover {
  border-color: var(--border-dark);
}

/* focusing dims everything; the hot path stays lit. */
[data-focusing] [data-ren-card] {
  opacity: 0.13;
}
[data-focusing] [data-ren-card][data-hot] {
  opacity: 1;
  border-color: var(--border-dark);
}
[data-ren-card][data-sel] {
  border-color: var(--foreground);
  box-shadow: 0 0 0 1px var(--foreground);
}
[data-ren-card][data-sel] [data-ren-nm] {
  color: var(--foreground);
}

[data-ren-hd] {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border-component);
  background: var(--secondary);
}
[data-ren-nm] {
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-primary);
  font-size: 10.5px;
  line-height: 1;
}
/* Left-band cards (surfaces + connectors) carry display names, not identifiers — lift the leading
   letter so "github" reads as "Github". Identifier-like names elsewhere (projects, repos) stay verbatim. */
[data-side="l"] [data-ren-nm]::first-letter,
[data-side="l"] [data-ren-conn-nm]::first-letter {
  text-transform: uppercase;
}
[data-ren-tag] {
  flex: none;
  color: var(--text-quaternary);
  font-size: 8px;
  border: 1px solid var(--border-component);
  padding: 1px 5px;
  white-space: nowrap;
}

[data-ren-rw] {
  display: flex;
  gap: 7px;
  padding: 0 10px;
  height: 27px;
  align-items: center;
  font-size: 8.5px;
}
[data-ren-rw] + [data-ren-rw] {
  border-top: 1px solid var(--border-component);
}
[data-ren-rw] > span:not([data-ren-glyph]) {
  flex: 1;
  min-width: 0;
  line-height: 1.7;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-primary);
}
[data-ren-marker] {
  color: var(--text-quaternary);
}
[data-ren-rw] > b {
  flex: none;
  margin-left: auto;
  padding-left: 8px;
  color: var(--text-secondary);
  font-weight: 400;
  white-space: nowrap;
}
[data-ren-port] {
  cursor: pointer;
}
[data-ren-port]:hover > span,
[data-ren-port]:hover > b {
  color: var(--foreground);
}
[data-ren-port]:hover [data-ren-marker] {
  color: var(--foreground);
}
[data-ren-lv] {
  border: 1px solid var(--border-component);
  padding: 0 4px;
  color: var(--text-secondary);
}
[data-ren-pb] {
  height: 5px;
}

/* ---------------- category cards (one card per mcp category, one row per app) ---------------- */
[data-cat-row] {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 27px;
  padding: 0 10px;
  cursor: pointer;
  font-size: 8.5px;
  transition:
    opacity 0.2s,
    background 0.2s;
}
[data-cat-row] + [data-cat-row] {
  border-top: 1px solid var(--border-component);
}
[data-cat-row]:hover {
  background: var(--tint-2);
}
[data-focusing] [data-cat-row]:not([data-hot]) {
  opacity: 0.35;
}
[data-cat-row][data-sel] {
  background: var(--tint-3);
  box-shadow: inset 2px 0 0 var(--foreground);
}
[data-ren-conn-nm] {
  flex: 1;
  min-width: 0;
  color: var(--text-primary);
  line-height: 1.7;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
[data-cat-row][data-sel] [data-ren-conn-nm] {
  color: var(--foreground);
}
[data-ren-glyph] {
  flex: none;
  display: inline-flex;
  width: 14px;
  height: 14px;
  color: var(--text-secondary);
  opacity: 0.9;
}
[data-ren-glyph] > * {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
[data-ren-glyph] img {
  border-radius: 3px;
}

/* ---------------- wires ----------------
   non-scaling-stroke keeps the 1px line crisp in screen space at any zoom; without it the
   stroke scales sub-pixel under the viewport transform and the curve aliases into stair-steps. */
[data-ren-wire-path] {
  fill: none;
  stroke: var(--canvas-wire);
  stroke-width: 1;
  vector-effect: non-scaling-stroke;
  pointer-events: none;
  transition:
    stroke 0.2s,
    opacity 0.2s;
}
[data-kind="state"] [data-ren-wire-path] {
  opacity: 0.6;
}
[data-kind="cred"] [data-ren-wire-path] {
  stroke-dasharray: 4 4;
  stroke: transparent;
}
[data-ren-wend] {
  fill: var(--background);
  stroke: var(--canvas-wend);
  stroke-width: 1;
  vector-effect: non-scaling-stroke;
  pointer-events: none;
  transition:
    stroke 0.2s,
    opacity 0.2s;
}
[data-kind="cred"] [data-ren-wend] {
  stroke: transparent;
}

/* idle wires sit back so the cards carry the eye; focus dims them further, the hot wire blazes. */
[data-ren-wire] {
  opacity: 0.5;
}
[data-focusing] [data-ren-wire] {
  opacity: 0.15;
}
[data-focusing] [data-ren-wire][data-hot] {
  opacity: 1;
}
[data-focusing] [data-hot] [data-ren-wire-path] {
  stroke: var(--canvas-wire-hot);
}
[data-focusing] [data-hot] [data-ren-wend] {
  stroke: var(--canvas-wire-hot);
}

[data-ren-flow-path] {
  fill: none;
  stroke: var(--canvas-wire-hot);
  stroke-width: 1.5;
  vector-effect: non-scaling-stroke;
  stroke-dasharray: 5 7;
  pointer-events: none;
  animation: ren-wire-flow 0.6s linear infinite;
}
@keyframes ren-wire-flow {
  to {
    stroke-dashoffset: -12;
  }
}
@media (prefers-reduced-motion: reduce) {
  [data-ren-flow-path] {
    animation: none;
  }
}

/* ---------------- group frames (runtime pods + primitives, one shared chrome) ----------------
   A faint fill turns each group into one plate so its members read as belonging together; the
   solid border + corner ticks sit a notch above the (lighter) grid. A hot frame — the group of
   the clicked/hovered card — keeps full strength while the rest dim. */
[data-ren-frame] {
  position: absolute;
  pointer-events: none;
  background: var(--tint-1);
  border: 1px solid var(--border);
  transition:
    opacity 0.2s,
    background 0.2s,
    border-color 0.2s;
}
[data-focusing] [data-ren-frame] {
  opacity: 0.4;
}
[data-focusing] [data-ren-frame][data-hot] {
  opacity: 1;
}
[data-ren-frame][data-hot] {
  background: var(--tint-2);
  border-color: var(--border-dark);
}
[data-ren-frame][data-sel] {
  border-color: var(--foreground);
  background: var(--tint-2);
}
[data-focusing] [data-ren-frame][data-sel] {
  opacity: 1;
}
[data-ren-tab] {
  position: absolute;
  top: -12px;
  left: 14px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--card);
  padding: 0 10px;
  font-size: 13px;
  text-transform: capitalize;
  color: var(--text-primary);
  pointer-events: auto;
  cursor: pointer;
  white-space: nowrap;
  border: 0;
  font-family: var(--font-family-base);
  transition: color 0.2s;
}
[data-ren-tab]:hover {
  color: var(--foreground);
}
[data-ren-tick] {
  position: absolute;
  width: 7px;
  height: 7px;
  border-color: var(--border-dark);
  border-style: solid;
  border-width: 0;
}
[data-tick="tl"] {
  left: -1px;
  top: -1px;
  border-left-width: 1px;
  border-top-width: 1px;
}
[data-tick="tr"] {
  right: -1px;
  top: -1px;
  border-right-width: 1px;
  border-top-width: 1px;
}
[data-tick="bl"] {
  left: -1px;
  bottom: -1px;
  border-left-width: 1px;
  border-bottom-width: 1px;
}
[data-tick="br"] {
  right: -1px;
  bottom: -1px;
  border-right-width: 1px;
  border-bottom-width: 1px;
}


html, body { height: 100%; margin: 0; }
#ren-canvas,
[data-ren-canvas] {
  position: absolute;
  top: var(--header-height);
  left: 0;
  right: 0;
  bottom: 0;
  overflow: hidden;
}

/* header + mode toggle */
#ren-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--header-height);
  z-index: var(--layer-header);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-family-base);
}
.ren-header-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
}
#ren-mode-toggle {
  display: flex;
  border: 1px solid var(--border-component);
  border-radius: calc(var(--radius) / 2);
  overflow: hidden;
}
#ren-mode-toggle button {
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 500;
  border: 0;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  font-family: var(--font-family-base);
}
#ren-mode-toggle button[data-active] {
  background: var(--foreground);
  color: var(--primary-foreground);
}
#ren-mode-toggle button[data-active][data-mode="live"] {
  background: var(--function-success);
  color: #ffffff;
}

/* planned entity styling */
[data-ren-card][data-planned] {
  border-style: dashed;
}
[data-ren-canvas]:not([data-focusing]) [data-ren-card][data-planned] {
  opacity: 0.75;
}
[data-ren-frame][data-planned] {
  border-style: dashed;
}
[data-ren-canvas]:not([data-focusing]) [data-ren-frame][data-planned] {
  opacity: 0.75;
}

[data-ren-viewport] {
  position: absolute;
  inset: 0;
  overflow: hidden;
  cursor: grab;
  background-color: var(--background);
  background-size: 24px 24px;
  background-image:
    linear-gradient(to right, var(--tint-1) 1px, transparent 1px),
    linear-gradient(to bottom, var(--tint-1) 1px, transparent 1px);
}
[data-ren-viewport]:active { cursor: grabbing; }
[data-ren-stage] { position: absolute; top: 0; left: 0; }
[data-ren-wires] { pointer-events: none; }

/* ---------------- inspector ---------------- */
[data-ren-inspector] {
  position: absolute;
  inset-block: 0;
  right: 0;
  z-index: 20;
  display: flex;
  flex-direction: column;
  width: 320px;
  max-width: 80vw;
  border-left: 1px solid var(--border);
  background: var(--background);
  box-shadow: var(--shadow-button);
  font-size: 13px;
  color: var(--text-primary);
}
.ren-insp-head {
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.ren-insp-tile {
  flex: none;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 1px solid var(--border-component);
  border-radius: 6px;
  background: var(--secondary);
  color: var(--text-secondary);
}
.ren-insp-title { display: flex; min-width: 0; flex: 1; flex-direction: column; gap: 2px; padding-right: 24px; }
.ren-insp-title h2 {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ren-insp-title p {
  margin: 0;
  font-size: 12px;
  color: var(--text-tertiary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ren-insp-close {
  position: absolute;
  top: 16px;
  right: 16px;
  display: inline-flex;
  padding: 0;
  border: 0;
  background: none;
  color: var(--text-primary);
  opacity: 0.7;
  cursor: pointer;
  transition: opacity 0.2s;
}
.ren-insp-close:hover { opacity: 1; }
.ren-insp-body { flex: 1; min-height: 0; overflow-y: auto; padding-bottom: 16px; }
.ren-insp-g { display: inline-flex; align-items: center; justify-content: center; }
.ren-insp-g svg, .ren-insp-g img { width: 100%; height: 100%; object-fit: contain; }
.ren-insp-g img { border-radius: 3px; }
.ren-insp-fields { padding: 4px 0; }
.ren-insp-fields > * + * { border-top: 1px solid var(--border-component); }
.ren-insp-field {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  height: 36px;
  padding: 0 16px;
}
.ren-insp-field .lbl { flex: none; color: var(--text-tertiary); text-transform: capitalize; }
.ren-insp-field .val {
  color: var(--text-secondary);
  font-weight: 500;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ren-insp-section { border-top: 1px solid var(--border); padding: 8px 0; }
.ren-insp-sechead { display: flex; align-items: center; gap: 8px; padding: 4px 16px; }
.ren-insp-sechead > span:first-child {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}
.ren-insp-badge {
  border-radius: 999px;
  background: var(--secondary);
  padding: 0 6px;
  font-size: 10px;
  line-height: 16px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}
.ren-insp-row {
  box-sizing: border-box;
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  height: 36px;
  padding: 0 16px;
  font-size: 13px;
  text-align: left;
  color: var(--text-secondary);
  border: 0;
  background: none;
}
.ren-insp-row .g {
  flex: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  color: var(--text-tertiary);
}
.ren-insp-row .nm { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ren-insp-row .meta { flex: none; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
.ren-insp-link { cursor: pointer; transition: background 0.2s, color 0.2s; }
.ren-insp-link:hover { background: var(--tint-2); color: var(--text-primary); }
.ren-insp-link .chev { flex: none; display: inline-flex; color: var(--text-quaternary); opacity: 0; transition: opacity 0.2s; }
.ren-insp-link:hover .chev { opacity: 1; }

/* dark/light theme toggle */
#ren-theme-toggle {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: var(--layer-header);
  width: 32px;
  height: 32px;
  padding: 0;
  border: 1px solid var(--border-component);
  border-radius: 50%;
  background: var(--card);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
#ren-theme-toggle:hover {
  background: var(--tint-2);
  color: var(--text-primary);
  border-color: var(--border-dark);
}
#ren-theme-toggle svg {
  width: 14px;
  height: 14px;
}

    <script>

    <script>
      (function() {
        var btn = document.getElementById("ren-theme-toggle")
        if (!btn) return
        var root = document.documentElement
        function update() {
          var isDark = root.classList.contains("dark")
          btn.querySelector(".sun").style.display = isDark ? "none" : "block"
          btn.querySelector(".sun-rays").style.display = isDark ? "none" : "block"
          btn.querySelector(".moon").style.display = isDark ? "block" : "none"
        }
        btn.addEventListener("click", function() {
          root.classList.toggle("dark")
          update()
        })
        update()
      })()
    </script>
